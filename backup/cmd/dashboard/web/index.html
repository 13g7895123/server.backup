<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>備份管理系統</title>
<style>
:root{
  --bg:#f8fafc;--surface:#fff;--surface2:#f1f5f9;--border:#e2e8f0;
  --text:#0f172a;--text2:#64748b;--text3:#94a3b8;
  --primary:#2563eb;--primary-h:#1d4ed8;--primary-light:#eff6ff;
  --success:#16a34a;--success-bg:#f0fdf4;--success-border:#bbf7d0;
  --danger:#dc2626;--danger-bg:#fef2f2;--danger-border:#fecaca;
  --warning:#d97706;--warning-bg:#fffbeb;
  --info:#0891b2;--info-bg:#ecfeff;
  --sidebar-w:230px;--radius:8px;--rs:4px;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;color:var(--text);background:var(--bg);line-height:1.5}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit;font-size:16px;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:16px}
/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:#0f172a;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo h1{color:#fff;font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
.sidebar-nav{padding:8px 0;flex:1}
.nav-section{padding:16px 16px 5px;font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:rgba(255,255,255,.65);cursor:pointer;transition:.15s;border-left:3px solid transparent;font-size:15px}
.nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav-item.active{background:rgba(37,99,235,.2);color:#fff;border-left-color:#3b82f6}
.nav-item .ni{font-size:17px;width:18px;text-align:center}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-title{font-size:19px;font-weight:700}
.header-right{display:flex;align-items:center;gap:10px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--success)}
#content{flex:1;overflow-y:auto;padding:24px}
/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;border-left:3px solid transparent}
.stat-card.c-blue{border-left-color:var(--primary)}.stat-card.c-green{border-left-color:var(--success)}
.stat-card.c-red{border-left-color:var(--danger)}.stat-card.c-yellow{border-left-color:var(--warning)}
.stat-label{font-size:14px;color:var(--text2);font-weight:500;margin-bottom:6px}
.stat-value{font-size:28px;font-weight:800;color:var(--text);line-height:1.1}
.stat-sub{font-size:13px;color:var(--text3);margin-top:5px}
/* Tables */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:15px;background:var(--surface)}
thead th{padding:10px 14px;text-align:left;font-weight:600;color:var(--text2);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;font-size:13px;text-transform:uppercase;letter-spacing:.4px}
tbody td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafbfc}
.td-actions{display:flex;gap:5px;justify-content:flex-end;flex-wrap:nowrap}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rs);font-weight:500;transition:.15s;white-space:nowrap;font-size:15px}
.btn-sm{padding:5px 10px;font-size:14px}
.btn-xs{padding:3px 8px;font-size:13px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-h)}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{background:var(--surface2)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid var(--danger-border)}
.btn-danger:hover{background:#fee2e2}
.btn-success{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border)}
.btn-success:hover{background:#dcfce7}
.btn-ghost{color:var(--text2);border:1px solid transparent}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:13px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-success{background:var(--success-bg);color:var(--success)}.badge-success::before{background:var(--success)}
.badge-failed{background:var(--danger-bg);color:var(--danger)}.badge-failed::before{background:var(--danger)}
.badge-running{background:var(--info-bg);color:var(--info)}.badge-running::before{background:var(--info);animation:blink 1s infinite}
.badge-on{background:var(--success-bg);color:var(--success)}.badge-on::before{background:var(--success)}
.badge-off{background:var(--surface2);color:var(--text3)}.badge-off::before{background:var(--text3)}
.badge-files{background:#eff6ff;color:#1d4ed8}.badge-files::before{background:#1d4ed8}
.badge-database{background:#f5f3ff;color:#6d28d9}.badge-database::before{background:#6d28d9}
.badge-system{background:#fff7ed;color:#c2410c}.badge-system::before{background:#c2410c}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* Forms */
.form-group{margin-bottom:14px}
.form-label{display:block;font-weight:500;margin-bottom:5px;font-size:15px}
.form-hint{font-size:13px;color:var(--text3);margin-top:3px}
.form-input{width:100%;padding:7px 11px;border:1px solid var(--border);border-radius:var(--rs);color:var(--text);background:var(--surface);outline:none;transition:.15s}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-input[disabled]{background:var(--surface2);color:var(--text3)}
textarea.form-input{resize:vertical;min-height:72px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-check{display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:4px}
.form-check input[type=checkbox]{width:15px;height:15px;accent-color:var(--primary);cursor:pointer}
/* Toggle switch */
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle-track{width:34px;height:18px;background:var(--text3);border-radius:99px;position:relative;transition:.2s;flex-shrink:0}
.toggle-track.on{background:var(--primary)}
.toggle-thumb{position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s}
.toggle-track.on .toggle-thumb{left:18px}
/* Modal */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
#modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:560px;box-shadow:var(--shadow-md);margin:auto}
.modal-lg{max-width:720px}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:17px;font-weight:700}
.modal-close{font-size:18px;color:var(--text3);padding:4px 6px;border-radius:4px;line-height:1}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:18px 22px;max-height:65vh;overflow-y:auto}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tab{padding:10px 16px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-size:15px;white-space:nowrap}
.tab:hover{color:var(--text)}.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
/* Page header */
.page-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-hdr-left h1{font-size:22px;font-weight:700}.page-hdr-left p{font-size:14px;color:var(--text2);margin-top:3px}
.page-hdr-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
/* Filter bar */
.filter-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
select.form-input{width:auto}
/* Loading / Empty */
.loading{text-align:center;padding:48px 24px;color:var(--text3)}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px}
/* Toasts */
#toasts{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:8px;padding:11px 16px;border-radius:var(--radius);color:#fff;font-size:15px;box-shadow:var(--shadow-md);animation:tslide .2s ease;pointer-events:all;max-width:360px}
.toast.info{background:#334155}.toast.success{background:var(--success)}.toast.error{background:var(--danger)}.toast.warning{background:var(--warning)}
@keyframes tslide{from{transform:translateX(40px);opacity:0}to{transform:none;opacity:1}}
/* Section gap */
.sg{margin-bottom:20px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.mono{font-family:'SF Mono',Fira Code,monospace;font-size:14px}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;display:block}
.flex-c{display:flex;align-items:center;gap:8px}
.ml-a{margin-left:auto}
/* Project cards on dashboard */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.15s}
.proj-card:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.proj-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.proj-card h3{font-size:16px;font-weight:700}
.proj-card p{font-size:14px;color:var(--text2);margin-top:3px}
.proj-stats{display:flex;gap:16px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:14px;color:var(--text2)}
.proj-stat-item{display:flex;flex-direction:column;gap:2px}
.proj-stat-item strong{font-size:16px;font-weight:700;color:var(--text)}
/* Capabilities */
.cap-section{margin-bottom:20px}
.cap-section h3{font-size:15px;font-weight:700;margin-bottom:10px;color:var(--text)}
.cap-item{background:var(--surface2);border-radius:var(--rs);padding:11px 14px;margin-bottom:8px}
.cap-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cap-item h4{font-size:13px;font-weight:600}
.cap-item p{font-size:12px;color:var(--text2)}
.avail-yes{color:var(--success);font-weight:600;font-size:12px}
.avail-no{color:var(--danger);font-weight:600;font-size:12px}
.tag{display:inline-flex;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:600;background:var(--primary-light);color:var(--primary);margin:2px}
.route-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:6px}
.route-item{display:flex;gap:8px;align-items:center;padding:7px 10px;background:var(--surface2);border-radius:var(--rs);font-size:12px}
.method{font-weight:700;font-size:11px;padding:1px 6px;border-radius:3px;min-width:42px;text-align:center}
.m-get{background:#dbeafe;color:#1d4ed8}.m-post{background:#dcfce7;color:#15803d}
.m-put{background:#fef9c3;color:#a16207}.m-delete{background:#fee2e2;color:#b91c1c}
.m-patch{background:#f3e8ff;color:#7e22ce}
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>💾 備份管理系統</h1>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">主要功能</div>
      <div class="nav-item" data-p="dashboard"><span class="ni">📊</span>總覽</div>
      <div class="nav-item" data-p="projects"><span class="ni">📁</span>專案管理</div>
      <div class="nav-item" data-p="backups"><span class="ni">🗂</span>備份紀錄</div>
      <div class="nav-section">系統備份</div>
      <div class="nav-item" data-p="syslogs"><span class="ni">📋</span>系統日誌備份</div>
      <div class="nav-item" data-p="gcpbackup"><span class="ni">☁️</span>GCP 備份</div>
      <div class="nav-item" data-p="schedules"><span class="ni">🗓</span>排程管理</div>
      <div class="nav-section">系統</div>
      <div class="nav-item" data-p="capabilities"><span class="ni">⚙️</span>系統功能</div>
    </nav>
  </aside>
  <div class="main">
    <header>
      <div class="header-title" id="page-title">備份管理系統</div>
      <div class="header-right">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-label" style="font-size:12px;color:var(--text2)">連線中...</span>
      </div>
    </header>
    <main id="content"></main>
  </div>
</div>

<div id="modal-overlay">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toasts"></div>

<script>
'use strict';
/* ═══════════════════════════════════════════════════════════════
   API
═══════════════════════════════════════════════════════════════ */
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (r.status === 204) return null;
  const text = await r.text();
  let data;
  try { data = JSON.parse(text); } catch {
    throw new Error(`伺服器回應非 JSON（HTTP ${r.status}）`);
  }
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}
const apiGet    = p      => api('GET',    p);
const apiPost   = (p, b) => api('POST',   p, b);
const apiPut    = (p, b) => api('PUT',    p, b);
const apiPatch  = (p, b) => api('PATCH',  p, b);
const apiDelete = p      => api('DELETE', p);

/* ═══════════════════════════════════════════════════════════════
   Utils
═══════════════════════════════════════════════════════════════ */
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success:'✓', error:'✕', warning:'⚠', info:'ℹ' };
  el.innerHTML = `<span>${icons[type]||'ℹ'}</span><span>${esc(msg)}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3200);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtSize(b) {
  if (!b) return '-';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b/1048576).toFixed(1) + ' MB';
  return (b/1073741824).toFixed(2) + ' GB';
}

function fmtDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function fmtDur(s) {
  if (!s) return '-';
  if (s < 60) return s.toFixed(1) + 's';
  return Math.floor(s/60) + 'm ' + (s % 60).toFixed(0) + 's';
}

// 從 cron 表達式判斷備份頻率
function cronFrequency(expr) {
  if (!expr) return null;
  const parts = expr.trim().split(/\s+/);
  if (parts.length < 5) return null;
  const [, hour, dom, , dow] = parts;
  if (dom !== '*' && dom !== '?') return 'monthly';
  if (dow !== '*' && dow !== '?') return 'weekly';
  if (hour !== '*') return 'daily';
  return 'other';
}

function statusBadge(s, msg = '') {
  const map = { success:'badge-success', failed:'badge-failed', running:'badge-running' };
  const labels = { success:'成功', failed:'失敗', running:'執行中' };
  return `<span class="badge ${map[s]||'badge-off'}" ${s==='failed'&&msg ? `title="${esc(msg)}"` : ''}>${labels[s]||esc(s)||'—'}</span>`;
}

function typeBadge(t) {
  const map = { files:'badge-files', database:'badge-database', system:'badge-system', syslog:'badge-files', gcp:'badge-database' };
  const labels = { files:'檔案', database:'資料庫', system:'系統', syslog:'系統日誌', gcp:'GCP' };
  return `<span class="badge ${map[t]||''}">${labels[t]||esc(t)}</span>`;
}

/* ═══════════════════════════════════════════════════════════════
   Modal
═══════════════════════════════════════════════════════════════ */
function openModal(title, body, footer = '', large = false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer || `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>`;
  document.getElementById('modal-box').className = 'modal' + (large ? ' modal-lg' : '');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

/* ═══════════════════════════════════════════════════════════════
   Router & Nav
═══════════════════════════════════════════════════════════════ */
let currentPage = 'dashboard';
let currentProjectId = null;
let currentTab = 'targets';

function navigate(page, projectId = null) {
  currentPage = page;
  currentProjectId = projectId;
  currentTab = 'targets';
  window.location.hash = projectId ? `#${page}/${projectId}` : `#${page}`;
  renderPage();
  updateNav();
}

function updateNav() {
  const p = currentProjectId ? 'projects' : currentPage;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.p === p);
  });
}

document.querySelectorAll('.nav-item').forEach(el => {
  el.addEventListener('click', () => navigate(el.dataset.p));
});

function setContent(html) {
  document.getElementById('content').innerHTML = html;
}

function setTitle(t) {
  document.getElementById('page-title').textContent = t;
}

function loading() {
  setContent('<div class="loading"><div class="spinner"></div>載入中...</div>');
}

/* ═══════════════════════════════════════════════════════════════
   Dashboard
═══════════════════════════════════════════════════════════════ */
function renderDashFreq(key) {
  const d = window._dashData;
  if (!d) return;

  document.querySelectorAll('#dash-freq-tabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.key === key);
  });

  const items = d.allItems.filter(it => cronFrequency(it.cron) === key);

  function periodRange(isPrev) {
    const now   = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    if (key === 'daily') {
      const s = isPrev ? new Date(+today - 86400000) : today;
      const e = isPrev ? today : now;
      return { start: s, end: e, label: isPrev ? '昨日' : '今日' };
    }
    if (key === 'weekly') {
      const wd  = today.getDay();
      const mon = new Date(+today - (wd === 0 ? 6 : wd - 1) * 86400000);
      const s   = isPrev ? new Date(+mon - 7 * 86400000) : mon;
      const e   = isPrev ? mon : now;
      return { start: s, end: e, label: isPrev ? '上週' : '本週' };
    }
    if (key === 'monthly') {
      const thisM = new Date(now.getFullYear(), now.getMonth(), 1);
      const lastM = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const s     = isPrev ? lastM : thisM;
      const e     = isPrev ? thisM : now;
      return { start: s, end: e, label: isPrev ? '上月' : '本月' };
    }
    return { start: new Date(0), end: now, label: isPrev ? '上期' : '本期' };
  }

  const curr = periodRange(false);
  const prev = periodRange(true);
  const filterRecs = range => d.allRecs.filter(r => {

  const stat = recs => ({
    total: recs.length,
    ok:    recs.filter(r => r.status === 'success').length,

}

function renderDashFreq(key) {
  const d = window._dashData;
  if (!d) return;

  document.querySelectorAll('#dash-freq-tabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.key === key);
  });

  const items = d.allItems.filter(it => cronFrequency(it.cron) === key);

  function periodRange(isPrev) {
    const now   = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    if (key === 'daily') {
      const s = isPrev ? new Date(+today - 86400000) : today;
      const e = isPrev ? today : now;
      return { start: s, end: e, label: isPrev ? '昨日' : '今日' };
    }
    if (key === 'weekly') {
      const wd  = today.getDay();
      const mon = new Date(+today - (wd === 0 ? 6 : wd - 1) * 86400000);
      const s   = isPrev ? new Date(+mon - 7 * 86400000) : mon;
      const e   = isPrev ? mon : now;
      return { start: s, end: e, label: isPrev ? '上週' : '本週' };
    }
    if (key === 'monthly') {
      const thisM = new Date(now.getFullYear(), now.getMonth(), 1);
      const lastM = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const s     = isPrev ? lastM : thisM;
      const e     = isPrev ? thisM : now;
      return { start: s, end: e, label: isPrev ? '上月' : '本月' };
    }
    return { start: new Date(0), end: now, label: isPrev ? '上期' : '本期' };
  }

  const curr = periodRange(false);
  const prev = periodRange(true);
  const filterRecs = range => d.allRecs.filter(r => {
    const t = new Date(r.created_at);
    return t >= range.start && t < range.end;
  });
  const currRecs = filterRecs(curr);
  const prevRecs = filterRecs(prev);

  const stat = recs => ({
    total: recs.length,
    ok:    recs.filter(r => r.status === 'success').length,
    fail:  recs.filter(r => r.status === 'failed').length,
  });
  const cs = stat(currRecs), ps = stat(prevRecs);

    const cls = st.fail > 0 ? 'c-red' : st.ok > 0 ? 'c-green' : '';
    return `<div class="stat-card ${cls}" style="flex:1;min-width:150px">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${st.total}</div>
      <div class="stat-sub">
        <span style="color:var(--success)">✓ ${st.ok} 成功</span>
        ${st.fail > 0 ? `&nbsp;<span style="color:var(--danger)">✕ ${st.fail} 失敗</span>` : ''}
      </div>
    </div>`;
  };

  const itemRows = items.length === 0
    ? `<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:20px">此頻率無排程項目</td></tr>`
    : items.map(it => `<tr>
        <td><span class="badge ${it.typeClass}" style="font-size:11px">${it.typeLabel}</span></td>
        <td><strong>${it.name}</strong>${it.desc ? `<span style="display:inline-block;margin-left:7px;padding:1px 8px;border-radius:99px;font-size:11px;font-weight:500;background:#eff6ff;color:#1d4ed8;vertical-align:middle">${it.desc}</span>` : ''}</td>
        <td>${runStatusBadge(it.status, it.errMsg)}</td>
        <td style="font-size:12px;white-space:nowrap">${fmtDate(it.lastRun)||'—'}</td>
        <td style="font-size:12px;white-space:nowrap">${fmtDate(it.nextRun)||'—'}</td>
      </tr>`).join('');

  const recRows = recs => recs.slice(0, 15).map(r => `<tr>
    <td>${typeBadge(r.type)}</td>
    <td><span class="truncate">${esc(r.project_name||r.label||'—')}</span></td>
    <td>${statusBadge(r.status, r.error_msg)}</td>
    <td>${fmtSize(r.size_bytes)}</td>
    <td style="font-size:12px;white-space:nowrap">${fmtDate(r.created_at)}</td>
  </tr>`).join('');

  const recSection = (label, recs) => recs.length === 0
    ? `<div style="color:var(--text3);font-size:12px;padding:4px 0">${label}：無備份紀錄</div>`
    : `<div style="font-size:12px;font-weight:600;margin:14px 0 6px;color:var(--text)">${label} 備份紀錄（${recs.length} 筆）</div>
       <div class="table-wrap"><table>
         <thead><tr><th>類型</th><th>名稱</th><th>狀態</th><th>大小</th><th>時間</th></tr></thead>
         <tbody>${recRows(recs)}</tbody>
       </table></div>`;

  document.getElementById('dash-freq-content').innerHTML = `
    <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">

async function submitProject(id = null) {
  const split = s => s.split(',').map(x=>x.trim()).filter(Boolean);
  const dbMode = document.getElementById('f-dbmode').value;
  const body = {
    name:                document.getElementById('f-name').value.trim(),
    description:         document.getElementById('f-desc').value.trim(),
    nas_base:            document.getElementById('f-nas').value.trim() || '/mnt/nas/backups',
    project_path:        document.getElementById('f-path').value.trim(),
    backup_dirs:         split(document.getElementById('f-bdirs').value),
    enabled:             true,
    db_type: '', db_host: '', db_port: 0, db_name: '', db_user: '', db_password: '', db_password_env: '', docker_db_container: ''
  };
  if (dbMode === 'docker') {
    body.db_type             = document.getElementById('f-dbtype-d').value;
    body.docker_db_container = document.getElementById('f-container').value.trim();
    body.db_name             = document.getElementById('f-dbname-d').value.trim();
    body.db_user             = document.getElementById('f-dbuser-d').value.trim();
    body.db_password         = document.getElementById('f-dbpassword-d').value;
    body.db_password_env     = document.getElementById('f-dbpass-d').value.trim();
  } else if (dbMode === 'direct') {
    body.db_type         = document.getElementById('f-dbtype').value;
    body.db_host         = document.getElementById('f-dbhost').value.trim();
    body.db_port         = parseInt(document.getElementById('f-dbport').value) || 5432;
    body.db_name         = document.getElementById('f-dbname').value.trim();
    body.db_user         = document.getElementById('f-dbuser').value.trim();
    body.db_password_env = document.getElementById('f-dbpass').value.trim();
  }
  if (!body.name) { toast('請填寫專案名稱','warning'); return; }
  try {
    if (id) { await apiPut(`/api/projects/${id}`, body); toast('專案已更新','success'); }
    else { await apiPost('/api/projects', body); toast('專案已建立','success'); }
    closeModal();
    renderProjects();
  } catch(e) { toast(e.message,'error'); }
}

function downloadTemplate(mode) {
  let data, filename;
  if (mode === 'batch') {
    data = [
      { ..._projectTemplate, name: 'project-a' },
      { ..._projectTemplate, name: 'project-b', db_type: 'mysql', db_host: '127.0.0.1', db_name: 'mydb' },
      { ..._projectTemplate, name: 'project-c', docker_db_container: 'my-postgres-1', db_name: 'appdb', db_user: 'appuser' }
    ];
    filename = 'projects-batch-template.json';
  } else {
    data = _projectTemplate;
    filename = 'project-template.json';
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function previewImportFile() {
  const file = document.getElementById('import-file').files[0];
  const preview = document.getElementById('import-preview');
  if (!file) { preview.innerHTML = ''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      const items = Array.isArray(parsed) ? parsed : [parsed];
      preview.innerHTML = `
        <div style="padding:10px 14px;background:var(--success-bg);border:1px solid var(--success-border);border-radius:var(--rs);font-size:13px;color:var(--success)">
          ✓ 檔案解析成功，共 <strong>${items.length}</strong> 筆專案資料
          <div style="margin-top:6px;color:var(--text2)">${items.map((p,i) => `<span style="margin-right:8px">${i+1}. ${esc(p.name||'(未命名)')}</span>`).join('')}</div>
        </div>`;
    } catch(ex) {
      preview.innerHTML = `<div style="padding:10px 14px;background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--rs);font-size:13px;color:var(--danger)">✕ JSON 格式錯誤：${esc(ex.message)}</div>`;
    }
  };
  reader.readAsText(file);
}

async function importProjectFromFile() {
  const file = document.getElementById('import-file')?.files[0];
  if (!file) { toast('請先選取 JSON 檔案', 'warning'); return; }
  let parsed;
  try {
    const text = await file.text();
    parsed = JSON.parse(text);
  } catch(ex) {
    toast('JSON 格式錯誤：' + ex.message, 'error'); return;
  }
  const items = Array.isArray(parsed) ? parsed : [parsed];
  if (items.length === 0) { toast('檔案內沒有資料', 'warning'); return; }

  let success = 0, fail = 0, failMsgs = [];
  for (const proj of items) {
    const body = {
      name:                String(proj.name || '').trim(),
      description:         String(proj.description || '').trim(),
      nas_base:            String(proj.nas_base || '/mnt/nas/backups').trim(),
      project_path:        String(proj.project_path || '').trim(),
      backup_dirs:         Array.isArray(proj.backup_dirs) ? proj.backup_dirs.filter(Boolean) : [],
      enabled:             proj.enabled !== false,
      db_type:             String(proj.db_type || ''),
      db_host:             String(proj.db_host || ''),
      db_port:             parseInt(proj.db_port) || 0,
      db_name:             String(proj.db_name || ''),
      db_user:             String(proj.db_user || ''),
      db_password:         String(proj.db_password || ''),
      db_password_env:     String(proj.db_password_env || ''),
      docker_db_container: String(proj.docker_db_container || '')
    };
    if (!body.name) { fail++; failMsgs.push('第 ' + (success+fail) + ' 筆：name 為空'); continue; }
    try {
      await apiPost('/api/projects', body);
      success++;
    } catch(ex) {
      fail++;
      failMsgs.push(`「${body.name}」：${ex.message}`);
    }
  }

  closeModal();
  if (success > 0) toast(`成功匯入 ${success} 個專案` + (fail > 0 ? `，${fail} 筆失敗` : ''), fail > 0 ? 'warning' : 'success');
  if (failMsgs.length) {
    openModal('部分匯入失敗', `
      <p style="margin-bottom:10px;color:var(--danger)">以下 ${failMsgs.length} 筆匯入失敗：</p>
      <ul style="font-size:13px;color:var(--text2);line-height:1.8;padding-left:18px">
        ${failMsgs.map(m => `<li>${esc(m)}</li>`).join('')}
      </ul>
    `);
  }
  renderProjects();
}

function configSummary(type, cfg) {

    const c = typeof cfg === 'string' ? JSON.parse(cfg) : cfg;
    if (type === 'files') return c.source || '';
    if (type === 'database') return `${c.db_type||''}@${c.host||''}:${c.port||''} / ${c.name||''}`;
    if (type === 'system') return (c.include||[]).join(', ');
  } catch { return ''; }
  return '';
}

  return `
    <div class="form-group">
      <label class="form-label">標籤</label>
      <input id="f-tlabel" class="form-input" value="${esc(t.label||'')}" placeholder="例：主資料庫">
    </div>
    <div class="form-group">
      <label class="form-label">備份類型</label>
      <select id="f-ttype" class="form-input">
        <option value="files"    ${type==='files'   ?'selected':''}>📄 檔案備份</option>
        <option value="database" ${type==='database'?'selected':''}>🗄 資料庫備份</option>
      </select>
    </div>
    <div id="target-config-fields">${targetConfigFields(type, cfg)}</div>

        <div class="form-group">
          <label class="form-label">主機位址 <span style="color:var(--danger)">*</span></label>
          <input id="f-dbhost" class="form-input" value="${esc(cfg.host||'')}" placeholder="127.0.0.1">
        </div>
        <div class="form-group">
          <label class="form-label">Port</label>
          <input id="f-dbport" class="form-input" type="number" value="${esc(cfg.port||'5432')}" placeholder="5432">
        </div>
      </div>
    </div>
    <div id="f-db-container-fields" style="${cfg.container_name?'':'display:none'}">
      <div class="form-group">
        <label class="form-label">Container 名稱 <span style="color:var(--danger)">*</span></label>
        <input id="f-dbcontainer" class="form-input" value="${esc(cfg.container_name||'')}" placeholder="my-postgres">
        <div class="form-hint">docker ps 看到的 container 名稱，不需在 agent 上安裝 pg_dump/mysqldump</div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">資料庫類型</label>
        <select id="f-dbtype" class="form-input">
          <option value="postgres" ${cfg.db_type==='postgres'?'selected':''}>PostgreSQL</option>
          <option value="mysql"    ${cfg.db_type==='mysql'   ?'selected':''}>MySQL / MariaDB</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">資料庫名稱 <span style="color:var(--danger)">*</span></label>
        <input id="f-dbname" class="form-input" value="${esc(cfg.name||'')}" placeholder="mydb">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">使用者名稱</label>
        <input id="f-dbuser" class="form-input" value="${esc(cfg.user||'')}" placeholder="backup_user">

        <input id="f-dbpassword" class="form-input" type="password" value="${esc(cfg.password||'')}" placeholder="（直接輸入密碼）">
        <div class="form-hint">直接填密碼（優先），或留空改用下方環境變數</div>
      </div>

    </div>

      <label class="form-check"><input type="checkbox" id="f-pkg" ${cfg.backup_packages!==false?'checked':''}> 備份已安裝套件清單（dpkg）</label>

    </div>`;

function buildTargetConfig(type) {
  const v = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const c = id => { const el = document.getElementById(id); return el ? el.checked : false; };
  const split = s => s.split(',').map(x=>x.trim()).filter(Boolean);
  if (type === 'files')    return { source: v('f-source'), compress: 'gzip', exclude: split(v('f-exclude')) };
  if (type === 'database') return { db_type: v('f-dbtype'), host: v('f-dbhost'), port: parseInt(v('f-dbport'))||5432, name: v('f-dbname'), user: v('f-dbuser'), password: v('f-dbpassword'), password_env: v('f-dbpass'), container_name: v('f-dbcontainer') };
  if (type === 'system')   return { include: split(v('f-include')), exclude: split(v('f-sys-exclude')), backup_packages: c('f-pkg'), backup_services: c('f-svc') };
  return {};
}

async function submitTarget(projId, tid = null) {
  const type = document.getElementById('f-ttype').value;
  const label = document.getElementById('f-tlabel').value.trim();
  const config = buildTargetConfig(type);
  if (type === 'files' && !config.source) { toast('請填寫來源目錄','warning'); return; }
  if (type === 'database' && (!config.host && !config.container_name)) { toast('請填寫主機位址或 Container 名稱','warning'); return; }
  const body = { type, label, config, enabled: true };
  try {
    if (tid) { await apiPut(`/api/projects/${projId}/targets/${tid}`, body); toast('已更新','success'); }
    else { await apiPost(`/api/projects/${projId}/targets`, body); toast('已新增','success'); }
    closeModal();
    renderTargetsTab(projId);
  } catch(e) { toast(e.message,'error'); }
}

async function deleteTarget(projId, tid) {
  if (!confirm('確定要刪除此備份目標？')) return;
  try {
    await apiDelete(`/api/projects/${projId}/targets/${tid}`);
    toast('已刪除','success');
    renderTargetsTab(projId);
  } catch(e) { toast(e.message,'error'); }
}

    label: document.getElementById('f-slabel').value.trim(),
    cron_expr,
    target_types: [document.getElementById('f-stypes').value],
    enabled: true
  };
  try {
    if (sid) { await apiPut(`/api/projects/${projId}/schedules/${sid}`, body); toast('排程已更新','success'); }
    else { await apiPost(`/api/projects/${projId}/schedules`, body); toast('排程已建立','success'); }

    if (currentPage === 'schedules') renderAllSchedules();
    else renderSchedulesTab(projId);

async function retryRecord(id) {
  const rec = _recordErrors[id];
  if (!rec || !rec.projectId) { toast('無法取得備份資訊', 'error'); return; }
  try {
    const r = await apiPost('/api/backups/trigger', { project_id: rec.projectId, target_type: rec.type || '' });
    toast(r.message || '重試已觸發', 'success');
    renderBackups();
  } catch(e) { toast(e.message, 'error'); }
}

/* ═══════════════════════════════════════════════════════════════

let backupFilter = { type: '', status: '', limit: 20, offset: 0 };

async function renderBackups() {
  setTitle('備份紀錄');
  loading();
  try {
    const [data, projects] = await Promise.all([
      apiGet(`/api/backups?type=${backupFilter.type}&status=${backupFilter.status}&limit=${backupFilter.limit}&offset=${backupFilter.offset}`),
      apiGet('/api/projects')
    ]);
    const recs  = data.records || [];
    const total = data.total   || 0;
    const pages = Math.ceil(total / backupFilter.limit);
    const curPage = Math.floor(backupFilter.offset / backupFilter.limit) + 1;

    // 快取錯誤訊息供 showRecordError 使用
    recs.forEach(r => { if (r.error_msg) _recordErrors[r.id] = { msg: r.error_msg, projectId: r.project_id, type: r.type }; });

    const projOptions = (projects||[]).map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');

    setContent(`
      <div class="page-hdr">
        <div class="page-hdr-left"><h1>備份紀錄</h1><p>共 ${total} 筆</p></div>
        <div class="page-hdr-right">
          <button class="btn btn-secondary" onclick="renderBackups()">↺ 重新整理</button>
        </div>
      </div>
      <div class="filter-bar">
        <select class="form-input" id="f-btype" onchange="applyBackupFilter()" style="min-width:120px">
          <option value="">全部類型</option>
          <option value="files"    ${backupFilter.type==='files'   ?'selected':''}>檔案</option>
          <option value="database" ${backupFilter.type==='database'?'selected':''}>資料庫</option>
        </select>
        <select class="form-input" id="f-bstatus" onchange="applyBackupFilter()" style="min-width:120px">
          <option value="">全部狀態</option>
          <option value="success" ${backupFilter.status==='success'?'selected':''}>成功</option>

function applyBackupFilter() {
  backupFilter.type   = document.getElementById('f-btype'  )?.value || '';

}

function clearBackupFilter() {
  backupFilter = { type:'', status:'', limit:20, offset:0 };

function backupPage(page) {
  backupFilter.offset = page * backupFilter.limit;
  renderBackups();
}

// 儲存失敗紀錄的錯誤訊息，供 showRecordError 使用
const _recordErrors = {};

function showRecordError(id) {
  const rec = _recordErrors[id];
  const msg = rec ? rec.msg : '(無錯誤訊息)';

  // 解析 [cmd] ... \n[error] ... \n[stderr] ... 格式
  let cmdLine = '', errorLine = '', stderrLine = '';
  const cmdMatch    = msg.match(/\[cmd\]\s*([^\n]+)/);
  const errorMatch  = msg.match(/\[error\]\s*([^\n]+)/);
  const stderrMatch = msg.match(/\[stderr\]\s*([\s\S]+)/);
  if (cmdMatch)    cmdLine    = cmdMatch[1].trim();
  if (errorMatch)  errorLine  = errorMatch[1].trim();
  if (stderrMatch) stderrLine = stderrMatch[1].trim();

  const cmdSection = cmdLine ? `
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px">執行的指令</div>
      <div style="background:#1e293b;color:#e2e8f0;padding:10px 14px;border-radius:6px;font-family:monospace;font-size:13px;word-break:break-all;white-space:pre-wrap">${esc(cmdLine)}</div>
    </div>` : '';

  const stderrSection = stderrLine ? `
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px">指令輸出 (stderr)</div>
      <div style="background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:6px;padding:10px 14px;color:var(--danger);font-size:13px;word-break:break-all;white-space:pre-wrap;font-family:monospace">${esc(stderrLine)}</div>
    </div>` : '';

  const rawMsg = errorLine || msg;

  openModal('備份失敗原因', `
    ${cmdSection}
    <div style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px">錯誤訊息</div>
      <div style="background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:6px;padding:12px 14px;color:var(--danger);font-size:13px;word-break:break-all;white-space:pre-wrap;font-family:monospace">${esc(rawMsg)}</div>
    </div>
    ${stderrSection}
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">關閉</button>
    ${rec && rec.projectId ? `<button class="btn btn-primary" onclick="closeModal();retryRecord(${id})">重試</button>` : ''}
  `, true);
}

async function deleteRecord(id, projId = null) {
  if (!confirm('確定刪除此備份紀錄？（不會刪除 NAS 上的實體檔案）')) return;
  try {
    await apiDelete(`/api/backups/${id}`);
    toast('備份紀錄已刪除','success');
    if (projId) renderProjectRecords(projId);
    else renderBackups();
  } catch(e) { toast(e.message,'error'); }
}

async function showEditSyslog(id) {
  try {
    const items = await apiGet('/api/syslogs');
    const c = items.find(x => x.id === id);
    if (!c) { toast('找不到設定','error'); return; }
    openModal('編輯日誌備份設定', syslogForm(c), `
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="submitSyslog(${id})">儲存</button>
    `);
  } catch(e) { toast(e.message,'error'); }
}

async function submitSyslog(id = null) {
  const split = s => s.split(',').map(x=>x.trim()).filter(Boolean);
  const srcType = document.querySelector('input[name="sl-srctype"]:checked')?.value || 'file';
  const body = {
    name:           document.getElementById('sl-name').value.trim(),
    log_type:       document.getElementById('sl-type').value,
    source_type:    srcType,
    log_files:      srcType === 'file'    ? split(document.getElementById('sl-files').value) : [],
    journal_units:  srcType === 'journal' ? split(document.getElementById('sl-junits').value) : [],
    journal_format: srcType === 'journal' ? (document.getElementById('sl-jfmt').value || 'short') : 'short',
    dest:           document.getElementById('sl-dest').value.trim(),
    compress:       document.getElementById('sl-compress').checked,
    enabled:        document.getElementById('sl-enabled').checked
  };
  if (!body.name) { toast('請填寫名稱','warning'); return; }
  try {
    if (id) { await apiPut(`/api/syslogs/${id}`, body); toast('已更新','success'); }
    else { await apiPost('/api/syslogs', body); toast('已建立','success'); }
    closeModal();
    renderSyslogs();
  } catch(e) { toast(e.message,'error'); }
}

async function toggleSyslog(id, enabled) {

  } catch(e) { toast(e.message,'error'); }
}

    await apiDelete(`/api/syslogs/${id}`);
    toast('已刪除','success');
    renderSyslogs();
  } catch(e) { toast(e.message,'error'); }
}

function runStatusBadge(status, msg = '') {
  if (!status) return '';
  if (status === 'failed' && msg) {
    return `<span style="color:var(--danger);font-size:11px;cursor:pointer;text-decoration:underline dotted" onclick="showRunMsg(${JSON.stringify(msg)})">✕ 失敗 ⓘ</span>`;
  }
  const map = {
    running: '<span style="color:var(--warning);font-size:11px">⏳ 執行中</span>',
    success: '<span style="color:var(--success);font-size:11px">✓ 成功</span>',
    failed:  '<span style="color:var(--danger);font-size:11px">✕ 失敗</span>',
  };
  return map[status] || `<span style="font-size:11px">${esc(status)}</span>`;
}

function showRunMsg(msg) {
  openModal('執行錯誤詳細', `
    <div style="background:#1e293b;color:#fca5a5;padding:14px;border-radius:6px;font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;overflow-y:auto;max-height:420px">${esc(msg)}</div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">關閉</button>`, true);
}

let _integratedSelected = [];

async function renderIntegratedBackup() {
  setTitle('整合備份');
  loading();
  try {
    const items = await apiGet('/api/integrated');
    _integratedSelected = [];

    const byType = { project: [], syslog: [], gcp: [] };
    items.forEach(it => { if (byType[it.type]) byType[it.type].push(it); });

    function itemRow(it) {
      const typeLabel = it.type === 'project' ? '📁 專案' : it.type === 'syslog' ? '📋 日誌' : '☁️ GCP';
      const runBtn = it.type === 'project'
        ? `<button class="btn btn-xs btn-success" onclick="runIntProject(${it.id})">▶ 執行</button>`
        : it.type === 'syslog'
          ? `<button class="btn btn-xs btn-success" onclick="runSyslogInt(${it.id})">▶ 執行</button>`
          : `<button class="btn btn-xs btn-success" onclick="runGcpInt(${it.id})">▶ 執行</button>`;
      return `<tr id="int-row-${it.type}-${it.id}">
        <td style="width:32px"><input type="checkbox" onchange="intToggleSelect('${it.type}',${it.id},this.checked)"
          ${_integratedSelected.some(s=>s.type===it.type&&s.id===it.id)?'checked':''}></td>
        <td><span class="badge badge-system" style="font-size:11px">${typeLabel}</span></td>
        <td><strong>${esc(it.name)}</strong></td>
        <td><span class="badge ${it.enabled?'badge-on':'badge-off'}">${it.enabled?'啟用':'停用'}</span></td>
        <td><span class="mono" style="font-size:12px;color:var(--text2)">${esc(it.cron_expr)||'<span style="color:var(--text3)">未設定</span>'}</span></td>
        <td style="font-size:12px">${runStatusBadge(it.run_status, it.run_message)}${it.last_run_at?'<br><span style="color:var(--text3)">'+fmtDate(it.last_run_at)+'</span>':''}</td>
        <td class="td-actions">${runBtn}</td>
      </tr>`;
    }

    function section(title, type, list) {
      if (!list.length) return '';
      return `<div style="margin-bottom:20px">
        <div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px">${title}（${list.length} 項，啟用 ${list.filter(x=>x.enabled).length} 項）</div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th style="width:32px"><input type="checkbox" id="chk-all-${type}" onchange="intSelectAllType('${type}',this.checked)"></th>
              <th>類型</th><th>名稱</th><th>狀態</th><th>排程頻率（cron）</th><th>最後執行</th><th style="text-align:right">操作</th>
            </tr></thead>
            <tbody>${list.map(itemRow).join('')}</tbody>
          </table>
        </div>
      </div>`;
    }

    setContent(`
      <div class="page-hdr">
        <div class="page-hdr-left"><h1>整合備份</h1><p>統一管理並執行所有備份項目</p></div>
        <div class="page-hdr-right" style="gap:8px">
          <button class="btn btn-primary" onclick="intRunAll()">▶ 執行全部已啟用</button>
          <button class="btn btn-secondary" onclick="renderIntegratedBackup()">🔄 重新整理</button>
        </div>
      </div>

      <div id="int-batch-bar" style="display:none;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">
        <span id="int-sel-count" style="font-size:13px;color:var(--text2)">已選 0 項</span>
        <button class="btn btn-xs btn-primary" onclick="intBatchRun()">▶ 批次執行</button>
        <button class="btn btn-xs btn-secondary" onclick="showBatchSchedule()">🕐 設定排程頻率</button>
        <button class="btn btn-xs btn-ghost" style="margin-left:auto" onclick="intClearSelect()">取消選取</button>
      </div>

      ${section('📁 專案備份', 'project', byType.project)}
      ${section('📋 系統日誌備份', 'syslog', byType.syslog)}
      ${section('☁️ GCP 備份', 'gcp', byType.gcp)}
      ${items.length===0?'<div class="empty"><div class="empty-icon">🔄</div>目前無任何備份項目</div>':''}
    `);
    // 初始隱藏 batch bar（已在 HTML 中，但用 display:none 覆蓋）
    const bar = document.getElementById('int-batch-bar');
    if (bar) bar.style.display = 'none';
  } catch(e) { setContent(`<div class="empty"><div class="empty-icon">⚠️</div>${esc(e.message)}</div>`); }
}

function intToggleSelect(type, id, checked) {
  if (checked) {
    if (!_integratedSelected.some(s=>s.type===type&&s.id===id))
      _integratedSelected.push({type, id});
  } else {
    _integratedSelected = _integratedSelected.filter(s=>!(s.type===type&&s.id===id));
  }
  updateIntBatchBar();
}

function intSelectAllType(type, checked) {
  document.querySelectorAll(`#int-row-${type}-*`).forEach(() => {}); // no-op placeholder
  document.querySelectorAll('[id^="int-row-'+type+'-"]').forEach(row => {
    const chk = row.querySelector('input[type=checkbox]');
    if (!chk) return;
    const id = parseInt(row.id.split('-').pop());
    chk.checked = checked;
    if (checked) {
      if (!_integratedSelected.some(s=>s.type===type&&s.id===id))
        _integratedSelected.push({type, id});
    } else {
      _integratedSelected = _integratedSelected.filter(s=>!(s.type===type&&s.id===id));
    }
  });
  updateIntBatchBar();
}

function intClearSelect() {
  _integratedSelected = [];
  document.querySelectorAll('[id^="int-row-"] input[type=checkbox]').forEach(c => c.checked = false);
  document.querySelectorAll('[id^="chk-all-"]').forEach(c => c.checked = false);
  updateIntBatchBar();
}

function updateIntBatchBar() {
  const bar = document.getElementById('int-batch-bar');
  const cnt = document.getElementById('int-sel-count');
  if (!bar) return;
  const n = _integratedSelected.length;
  bar.style.display = n > 0 ? 'flex' : 'none';
  if (cnt) cnt.textContent = `已選 ${n} 項`;
}

  if (!confirm('確定要執行全部已啟用的備份項目（專案 + syslog + GCP）？')) return;
  try {

    setTimeout(renderIntegratedBackup, 3000);

}

async function intBatchRun() {
  if (!_integratedSelected.length) { toast('請先勾選項目', 'warning'); return; }
  const projectItems = _integratedSelected.filter(s => s.type === 'project');
  const otherItems   = _integratedSelected.filter(s => s.type !== 'project');
  const promises = [];
  for (const it of projectItems) {
    promises.push(
      apiPost('/api/backups/trigger', { project_id: it.id, target_type: 'all' })
        .catch(e => console.warn('[intBatchRun] project', it.id, e))
    );
  }
  if (otherItems.length) {
    promises.push(
      apiPost('/api/integrated/batch-run', { items: otherItems })
        .catch(e => console.warn('[intBatchRun] batch', e))
    );
  }
  try {
    await Promise.all(promises);
    toast(`已觸發 ${_integratedSelected.length} 個備份任務`, 'success');
    setTimeout(renderIntegratedBackup, 3000);
  } catch(e) { toast(e.message, 'error'); }
}

let _schedClockTimer = null;

function _startSchedClock() {
  if (_schedClockTimer) clearInterval(_schedClockTimer);
  function tick() {
    if (currentPage !== 'schedules') { clearInterval(_schedClockTimer); _schedClockTimer = null; return; }
    const now  = new Date();
    const hms  = now.toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const date = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'short' });
    const el   = document.getElementById('sched-clock');
    const de   = document.getElementById('sched-date');
    if (el) el.textContent = hms;
    if (de) de.textContent = date;
  }
  tick();
  _schedClockTimer = setInterval(tick, 1000);
}

}

async function submitScheduleFromMgmt() {

async function toggleGcpSched(id, enabled) {

function editCronDialog(type, id, name, currentCron) {
  openModal(`排程設定：${name}`, `
    <div class="form-group">
      <label class="form-label">Cron 表達式</label>
      <input id="cron-expr-input" class="form-input" value="${esc(currentCron)}" placeholder="0 2 * * *">
      <div class="form-hint">格式：分 時 日 月 星期　範例：<code>0 2 * * *</code> = 每天凌晨 2:00</div>
    </div>`, `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="saveCronDialog('${type}',${id})">儲存</button>
  `);
}

async function saveCronDialog(type, id) {
  const cron = document.getElementById('cron-expr-input')?.value.trim();
  if (!cron) { toast('請填寫 cron 表達式', 'warning'); return; }
  try {
    const url = type === 'syslog' ? `/api/syslogs/${id}/schedule` : `/api/gcpconfigs/${id}/schedule`;
    await apiPatch(url, { cron_expr: cron });
    toast('排程已更新', 'success');
    closeModal();
    renderAllSchedules();
  } catch(e) { toast(e.message, 'error'); }
}

async function clearCronDialog(type, id, name) {
  if (!confirm(`確定要清除「${name}」的排程嗎？`)) return;
  try {
    const url = type === 'syslog' ? `/api/syslogs/${id}/schedule` : `/api/gcpconfigs/${id}/schedule`;
    await apiPatch(url, { cron_expr: '' });
    toast('排程已清除', 'success');
    renderAllSchedules();
  } catch(e) { toast(e.message, 'error'); }
}

async function toggleScheduleAll(projId, sid, enabled) {
  try {
    await apiPatch(`/api/projects/${projId}/schedules/${sid}/toggle`, { enabled });
    toast(enabled ? '已啟用' : '已停用', 'success');
    renderAllSchedules();
  } catch(e) { toast(e.message, 'error'); }

async function deleteScheduleAll(projId, sid) {
  if (!confirm('確定刪除此排程？')) return;
  try {
    await apiDelete(`/api/projects/${projId}/schedules/${sid}`);
    toast('已刪除', 'success');

let sshSince = '', sshUntil = '', sshUser = '';

async function renderSshAudit() {
  setTitle('SSH 登入稽核');

  // 預設：今天
  const today = new Date().toISOString().slice(0, 10);
  if (!sshSince) sshSince = today + 'T00:00';
  if (!sshUntil) { const n = new Date(); sshUntil = n.toISOString().slice(0, 16); }

  setContent(`
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px">
      <div class="form-group" style="margin:0">
        <label class="form-label" style="font-size:13px">開始時間</label>
        <input id="ssh-since" type="datetime-local" class="form-input" style="width:200px" value="${sshSince}" onchange="sshSince=this.value">
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label" style="font-size:13px">結束時間</label>
        <input id="ssh-until" type="datetime-local" class="form-input" style="width:200px" value="${sshUntil}" onchange="sshUntil=this.value">
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label" style="font-size:13px">過濾使用者</label>
        <input id="ssh-user" type="text" class="form-input" style="width:150px" placeholder="全部" value="${esc(sshUser)}" onchange="sshUser=this.value">
      </div>
      <button class="btn btn-primary" onclick="loadSshAudit()">🔍 查詢</button>
    </div>
    <div id="ssh-stats" class="stat-grid" style="margin-bottom:22px"></div>
    <div class="card" style="padding:0">
      <div id="ssh-table"><div class="loading"><div class="spinner"></div>載入中...</div></div>
    </div>`);

  await loadSshAudit();
}

async function loadSshAudit() {
  const sinceVal = (document.getElementById('ssh-since')?.value || sshSince).replace('T', ' ') + ':00';
  const untilVal = (document.getElementById('ssh-until')?.value || sshUntil).replace('T', ' ') + ':00';
  const userVal  =  document.getElementById('ssh-user')?.value  || sshUser;

  document.getElementById('ssh-table').innerHTML = '<div class="loading"><div class="spinner"></div>查詢中...</div>';
  document.getElementById('ssh-stats').innerHTML = '';

  try {
    let url = `/api/ssh-audit?since=${encodeURIComponent(sinceVal)}&until=${encodeURIComponent(untilVal)}`;
    if (userVal) url += `&user=${encodeURIComponent(userVal)}`;
    const data = await apiGet(url);

    // 統計卡
    document.getElementById('ssh-stats').innerHTML = `
      <div class="stat-card c-green"><div class="stat-label">成功登入</div><div class="stat-value">${data.sum_login}</div></div>
      <div class="stat-card c-red"><div class="stat-label">登入失敗</div><div class="stat-value">${data.sum_failed}</div></div>
      <div class="stat-card c-yellow"><div class="stat-label">sudo 操作</div><div class="stat-value">${data.sum_sudo}</div></div>
      <div class="stat-card c-blue"><div class="stat-label">不重複使用者</div><div class="stat-value">${data.sum_unique_users}</div></div>
      <div class="stat-card c-blue"><div class="stat-label">不重複來源 IP</div><div class="stat-value">${data.sum_unique_ips}</div></div>`;

    if (!data.events.length) {
      document.getElementById('ssh-table').innerHTML = '<div class="empty"><div class="empty-icon">🔐</div>此時段無 SSH 事件</div>';
      return;
    }

    const rows = data.events.map(e => {
      return `<tr>
        <td style="white-space:nowrap;font-size:13px">${fmtDate(e.time)}</td>
        <td>${sshTypeBadge(e.type)}</td>
        <td>${e.user ? `<code style="font-size:13px">${esc(e.user)}</code>` : '—'}</td>
        <td>${e.from_ip ? `<code style="font-size:13px">${esc(e.from_ip)}</code>` : '—'}</td>
        <td>${e.method ? `<span style="font-size:13px;color:var(--text2)">${esc(e.method)}</span>` : '—'}</td>
        <td style="max-width:340px;word-break:break-all;font-size:13px">${e.command ? `<code>${esc(e.command)}</code>` : esc(e.raw || '').slice(0, 120)}</td>
      </tr>`;
    }).join('');

    document.getElementById('ssh-table').innerHTML = `
      <div class="table-wrap" style="border-radius:0">
        <table>
          <thead><tr>
            <th>時間</th><th>類型</th><th>使用者</th><th>來源 IP</th><th>認證方式</th><th>詳細</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  } catch(e) {
    const msg = e.message || '未知錯誤';
    let hint = '';
    if (msg.includes('agent 無回應') || msg.includes('connection refused')) {
      hint = `<li>確認 agent 是否在執行：<code>systemctl status backup-agent</code></li>
              <li>確認 agent 監聽位址：<code>ss -tlnp | grep 9090</code></li>
              <li>確認 .env 的 AGENT_URL 設定：<code>grep AGENT_URL .env</code></li>`;
    } else if (msg.includes('journalctl')) {
      hint = `<li>確認 journald 是否運作：<code>systemctl status systemd-journald</code></li>
              <li>確認 agent 執行身份（需有 journal 讀取權）：<code>systemctl show backup-agent -p User</code></li>`;
    } else if (msg.includes('502') || msg.includes('Bad Gateway')) {
      hint = `<li>Dashboard 無法連到 agent，請確認 AGENT_URL 路由可達</li>
              <li>從 host 測試：<code>curl http://&lt;AGENT_URL&gt;/healthz</code></li>`;
    }
    document.getElementById('ssh-table').innerHTML = `
      <div style="padding:20px;background:var(--danger-bg);border:1px solid var(--danger-border);border-radius:var(--radius);color:var(--danger)">
        <div style="font-weight:700;font-size:15px;margin-bottom:8px">⚠️ 查詢失敗</div>
        <div style="font-family:monospace;font-size:13px;word-break:break-all;margin-bottom:${hint ? '12px' : '0'}">${esc(msg)}</div>
        ${hint ? `<div style="font-size:13px;color:var(--text);margin-top:8px"><b>診斷建議：</b><ul style="margin:6px 0 0 18px;line-height:1.8">${hint}</ul></div>` : ''}
      </div>`;
  }
}

function sshTypeBadge(type) {
  const map = {
    login:         ['badge-success', '✓ 登入成功'],
    login_failed:  ['badge-failed',  '✗ 登入失敗'],
    invalid_user:  ['badge-failed',  '✗ 無效使用者'],
    logout:        ['badge-off',     '⎋ 登出'],
    session_open:  ['badge-on',      '▶ 工作階段開啟'],
    session_close: ['badge-off',     '■ 工作階段關閉'],
    sudo:          ['badge-running', '⚡ sudo 操作'],
    other:         ['',              '— 其他'],
  };
  const [cls, label] = map[type] || ['', type];
  return `<span class="badge ${cls}" style="font-size:12px">${label}</span>`;
}

// Health check
async function checkHealth() {
  try {
    await fetch('/healthz');
    document.getElementById('status-dot').style.background = 'var(--success)';
    document.getElementById('status-label').textContent = '服務正常';
  } catch {
    document.getElementById('status-dot').style.background = 'var(--danger)';
    document.getElementById('status-label').textContent = '無法連線';
  }
}

// Parse initial hash
(function init() {
  const hash = window.location.hash.replace('#','');
  if (hash.startsWith('project/')) {
    const id = parseInt(hash.split('/')[1]);
    if (id) { currentPage = 'project'; currentProjectId = id; }
  } else if (hash) {
    currentPage = hash;
  }
  updateNav();
  renderPage();
  checkHealth();
  setInterval(checkHealth, 30000);
})();
</script>
